# Deploy en Fly.io (decidido en F2-1). Editar `app` con el nombre real al correr
# `fly launch`. El binario de Tesseract viene en el Dockerfile.
#
# Pasos (desde services/ingesta/):
#   fly launch --no-deploy          # crea la app (ajusta este nombre)
#   fly secrets set SUPABASE_URL=... SUPABASE_JWT_SECRET=... WEB_ORIGIN=https://tu-web
#   fly deploy
#   fly logs                        # smoke test: GET /v1/health
#
# Los secrets NUNCA van en este archivo (se setean con `fly secrets set`).

app = "cuentas-claras-ingesta"
primary_region = "gru"  # São Paulo (cercano a AR)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/v1/health"
      interval = "30s"
      timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
